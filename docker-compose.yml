services:
  postgres:
    image: postgres:16-alpine
    container_name: clearpantry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearpantry
      POSTGRES_PASSWORD: clearpantry
      POSTGRES_DB: clearpantry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
